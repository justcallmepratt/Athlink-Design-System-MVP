<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Athlink — Body & UI type</title>
  <link rel="stylesheet" href="../colors_and_type.css" />
  <style>
    body { margin: 0; padding: 24px; background: #fff; font-family: var(--font-body); color: var(--fg-primary); }
    .row { display: flex; flex-direction: column; gap: 12px; }
    .spec { display: flex; align-items: baseline; gap: 14px; }
    .meta { font-family: var(--font-mono); font-size: 11px; color: var(--fg-tertiary); width: 130px; flex: 0 0 130px; }
    .h3 { font-size: 20px; font-weight: 600; letter-spacing: -0.01em; }
    .h4 { font-size: 18px; font-weight: 600; }
    .body { font-size: 16px; color: var(--fg-secondary); line-height: 1.5; }
    .body-sm { font-size: 14px; color: var(--fg-secondary); }
    .caption { font-size: 12px; color: var(--fg-tertiary); }
    .eyebrow { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--fg-tertiary); }
  </style>
</head>
<body>
  <div class="row">
    <div class="spec"><span class="meta">H3 · 20/600</span><span class="h3">Top Countries</span></div>
    <div class="spec"><span class="meta">H4 · 18/600</span><span class="h4">Tsubasa Brennan</span></div>
    <div class="spec"><span class="meta">Body · 16/400</span><span class="body">Elite wide receiver from Osaka, Japan with NFL-level footwork.</span></div>
    <div class="spec"><span class="meta">Body sm · 14/400</span><span class="body-sm">62 receptions · 1,124 yards · 14 TDs</span></div>
    <div class="spec"><span class="meta">Caption · 12/400</span><span class="caption">+12% from last month</span></div>
    <div class="spec"><span class="meta">Eyebrow · 11/600</span><span class="eyebrow">NCAA Cleared</span></div>
  </div>
</body>
</html>
