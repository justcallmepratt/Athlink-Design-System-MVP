<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Athlink — Iconography</title>
  <link rel="stylesheet" href="../colors_and_type.css" />
  <style>
    body { margin: 0; padding: 22px; background: #fff; font-family: var(--font-body); }
    .grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 12px; }
    .icon-tile {
      aspect-ratio: 1; border: 1px solid var(--border-subtle);
      border-radius: 12px; display: grid; place-items: center;
      color: var(--fg-secondary);
    }
    .icon-tile svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 2; }
    .meta {
      font-size: 12px; color: var(--fg-tertiary); margin-top: 12px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .meta b { color: var(--fg-primary); font-weight: 600; }
    .ai { color: #8B5CF6; }
    .verify { color: #00BCD4; }
  </style>
</head>
<body>
  <div class="grid">
    <div class="icon-tile"><svg viewBox="0 0 24 24"><path d="M3 12l9-9 9 9M5 10v10h14V10"/></svg></div>
    <div class="icon-tile"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M20 20l-3-3"/></svg></div>
    <div class="icon-tile"><svg viewBox="0 0 24 24"><path d="M21 11.5a8.4 8.4 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.4 8.4 0 0 1-3.8-.9L3 21l1.9-5.7a8.4 8.4 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.4 8.4 0 0 1 3.8-.9h.5a8.5 8.5 0 0 1 8 8z"/></svg></div>
    <div class="icon-tile"><svg viewBox="0 0 24 24"><path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.7l-1-1.1a5.5 5.5 0 0 0-7.8 7.8l1 1.1L12 21l7.8-7.8 1-1.1a5.5 5.5 0 0 0 0-7.8z"/></svg></div>
    <div class="icon-tile"><svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0 1 16 0"/></svg></div>
    <div class="icon-tile"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15 15 0 0 1 0 20M12 2a15 15 0 0 0 0 20"/></svg></div>
    <div class="icon-tile"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M8 12l3 3 5-5"/></svg></div>
    <div class="icon-tile"><svg viewBox="0 0 24 24"><path d="M5 12l4 4 10-10"/></svg></div>
    <div class="icon-tile"><svg viewBox="0 0 24 24"><polygon points="6 4 20 12 6 20 6 4"/></svg></div>
    <div class="icon-tile"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6M9 14h6M9 18h6"/></svg></div>

    <div class="icon-tile ai"><svg viewBox="0 0 24 24"><path d="M9 18V5L21 3v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg></div>
    <div class="icon-tile ai"><svg viewBox="0 0 24 24"><path d="M12 3l1.5 4.5L18 9l-4.5 1.5L12 15l-1.5-4.5L6 9l4.5-1.5z"/><path d="M19 16l1 2 2 1-2 1-1 2-1-2-2-1 2-1z"/></svg></div>
    <div class="icon-tile ai"><svg viewBox="0 0 24 24"><path d="M3 7v4l4 2-4 2v4l9 4 9-4v-4l-4-2 4-2V7l-9-4z"/></svg></div>
    <div class="icon-tile verify"><svg viewBox="0 0 24 24"><path d="M3 7v6a4 4 0 0 0 4 4h2M21 17v-6a4 4 0 0 0-4-4h-2M7 3h2M15 3h2M7 21h2M15 21h2M3 17v0M21 7v0"/></svg></div>
    <div class="icon-tile verify"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"/></svg></div>
    <div class="icon-tile"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M7 17V11M12 17V7M17 17v-4"/></svg></div>
    <div class="icon-tile"><svg viewBox="0 0 24 24"><path d="M12 2a4 4 0 0 0-4 4v6a4 4 0 0 0 8 0V6a4 4 0 0 0-4-4z"/><path d="M5 10v2a7 7 0 0 0 14 0v-2M12 19v3"/></svg></div>
    <div class="icon-tile"><svg viewBox="0 0 24 24"><path d="M22 4L12 14l-3-3-7 7"/><polyline points="22 11 22 4 15 4"/></svg></div>
    <div class="icon-tile"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg></div>
    <div class="icon-tile"><svg viewBox="0 0 24 24"><circle cx="9" cy="11" r="3"/><path d="M3 21a6 6 0 0 1 12 0M16 11h6M16 16h6M16 6h6"/></svg></div>
  </div>

  <div class="meta">
    <span><b>Lucide</b> · outline · 24×24 · stroke 2</span>
    <span style="color:#8B5CF6">— purple = AI/scoring</span>
    <span style="color:#00BCD4">— cyan = verification</span>
    <span>— inherit text color elsewhere</span>
  </div>
</body>
</html>
