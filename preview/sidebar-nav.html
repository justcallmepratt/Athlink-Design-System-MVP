<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Athlink — Sidebar nav</title>
  <link rel="stylesheet" href="../colors_and_type.css" />
  <style>
    body { margin: 0; padding: 20px; background: var(--gray-50); font-family: var(--font-body); }
    .nav {
      width: 240px; background: #fff; border: 1px solid var(--border-subtle);
      border-radius: 12px; padding: 14px 12px; box-shadow: var(--shadow-xs);
    }
    .row { display: flex; align-items: center; gap: 10px; padding: 9px 12px; border-radius: 8px; font-size: 14px; color: var(--fg-secondary); margin-bottom: 2px; cursor: pointer; transition: background 150ms; }
    .row:hover { background: var(--gray-50); color: var(--fg-primary); }
    .row.active { background: var(--brand-blue); color: #fff; }
    .row svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2; }
    .row .count { margin-left: auto; font-size: 11px; padding: 2px 8px; border-radius: 9999px; background: var(--gray-100); color: var(--fg-secondary); font-weight: 600; }
    .row.active .count { background: rgba(255,255,255,0.22); color: #fff; }
    .row .dot { margin-left: auto; width: 6px; height: 6px; background: var(--danger); border-radius: 9999px; }
    .divider { height: 1px; background: var(--border-subtle); margin: 8px 0; }
  </style>
</head>
<body>
  <div style="display:flex;gap:24px;align-items:flex-start">
    <div class="nav">
      <div class="row active">
        <svg viewBox="0 0 24 24"><path d="M3 12l9-9 9 9M5 10v10h14V10"/></svg>
        Dashboard
      </div>
      <div class="row">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M20 20l-3-3"/></svg>
        Discover
      </div>
      <div class="row">
        <svg viewBox="0 0 24 24"><path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.7l-1-1.1a5.5 5.5 0 0 0-7.8 7.8l1 1.1L12 21l7.8-7.8 1-1.1a5.5 5.5 0 0 0 0-7.8z"/></svg>
        Saved <span class="count">3</span>
      </div>
      <div class="row">
        <svg viewBox="0 0 24 24"><path d="M21 11.5a8.4 8.4 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.4 8.4 0 0 1-3.8-.9L3 21l1.9-5.7a8.4 8.4 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.4 8.4 0 0 1 3.8-.9h.5a8.5 8.5 0 0 1 8 8z"/></svg>
        Messages <span class="dot"></span>
      </div>
      <div class="divider"></div>
      <div class="row">
        <svg viewBox="0 0 24 24"><path d="M9 11.5l3-3 3 3M9 16h6"/><rect x="3" y="3" width="18" height="18" rx="2"/></svg>
        AI Reports
      </div>
      <div class="row">
        <svg viewBox="0 0 24 24"><path d="M14 12V8H6v8h6"/><path d="M22 12v6h-6v-6h6z"/></svg>
        Compare <span class="count">2/3</span>
      </div>
    </div>

    <div style="flex:1; padding-top: 4px">
      <div style="font-size:12px;color:var(--fg-tertiary);text-transform:uppercase;letter-spacing:.06em;font-weight:600;margin-bottom:8px">Spec</div>
      <div style="font-size:13px;color:var(--fg-secondary);line-height:1.6">
        Fixed 256 px width on desktop · 9 px row padding-y · 12 px gap from icon to label · active state uses solid <code style="font-family:var(--font-mono);font-size:12px;color:var(--brand-blue-700)">#2196F3</code> with white glyph · counts use white-on-20% pill when active, otherwise gray-100.
      </div>
    </div>
  </div>
</body>
</html>
