<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Athlink — Spacing scale</title>
  <link rel="stylesheet" href="../colors_and_type.css" />
  <style>
    body { margin: 0; padding: 22px; background: #fff; font-family: var(--font-body); }
    .row { display: flex; flex-direction: column; gap: 8px; }
    .item { display: flex; align-items: center; gap: 14px; }
    .name { width: 56px; font-family: var(--font-mono); font-size: 11px; color: var(--fg-tertiary); }
    .px   { width: 56px; font-family: var(--font-mono); font-size: 11px; color: var(--fg-secondary); }
    .bar  { background: var(--grad-cyan-blue); height: 14px; border-radius: 4px; }
    .use  { font-size: 12px; color: var(--fg-secondary); margin-left: 8px; }
  </style>
</head>
<body>
  <div class="row">
    <div class="item"><span class="name">space-1</span><span class="px">4 px</span><div class="bar" style="width:4px"></div><span class="use">icon-to-label gap</span></div>
    <div class="item"><span class="name">space-2</span><span class="px">8 px</span><div class="bar" style="width:8px"></div><span class="use">chip padding-y</span></div>
    <div class="item"><span class="name">space-3</span><span class="px">12 px</span><div class="bar" style="width:12px"></div><span class="use">stacked stats gap</span></div>
    <div class="item"><span class="name">space-4</span><span class="px">16 px</span><div class="bar" style="width:16px"></div><span class="use">card-inner secondary padding</span></div>
    <div class="item"><span class="name">space-6</span><span class="px">24 px</span><div class="bar" style="width:24px"></div><span class="use">card padding · grid gap (default)</span></div>
    <div class="item"><span class="name">space-8</span><span class="px">32 px</span><div class="bar" style="width:32px"></div><span class="use">section gap</span></div>
    <div class="item"><span class="name">space-12</span><span class="px">48 px</span><div class="bar" style="width:48px"></div><span class="use">page-section vertical rhythm</span></div>
  </div>
</body>
</html>
