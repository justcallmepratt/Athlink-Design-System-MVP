<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Athlink — AI score & verification</title>
  <link rel="stylesheet" href="../colors_and_type.css" />
  <style>
    body { margin: 0; padding: 22px; background: #fff; font-family: var(--font-body); }
    .row { display: grid; grid-template-columns: auto 1fr 1fr; gap: 18px; align-items: center; }
    .ring {
      width: 110px; height: 110px; border-radius: 9999px;
      display: grid; place-items: center;
      background: conic-gradient(#2196F3 0% 65%, #00BCD4 65% 90%, #4CAF50 90% 95%, var(--gray-100) 95% 100%);
      position: relative;
    }
    .ring::after {
      content: ""; position: absolute; inset: 8px;
      background: #fff; border-radius: 9999px;
    }
    .ring .num {
      position: relative; z-index: 1;
      font-family: var(--font-display); font-weight: 800; font-size: 36px;
      letter-spacing: -0.02em;
      background: var(--grad-athlink);
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .label { font-size: 11px; color: var(--fg-tertiary); text-transform: uppercase; letter-spacing: .06em; font-weight: 600; }
    .bar { height: 6px; background: var(--gray-100); border-radius: 9999px; overflow: hidden; margin-top: 6px; }
    .fill { height: 100%; background: var(--grad-cyan-blue); border-radius: 9999px; }
    .item { margin-bottom: 10px; }
    .item .label-row { display: flex; justify-content: space-between; font-size: 12px; color: var(--fg-secondary); }
    .item .label-row b { color: var(--fg-primary); font-weight: 600; }
    .verify { display: flex; flex-direction: column; gap: 8px; }
    .v {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 8px 12px; border-radius: 9999px;
      background: var(--success-bg); color: var(--success-fg);
      font-size: 12px; font-weight: 500;
    }
    .v.ai { background: #F3E8FF; color: #6B21A8; }
    .v svg { width: 14px; height: 14px; }
  </style>
</head>
<body>
  <div class="row">
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
      <div class="ring"><span class="num">95</span></div>
      <span class="label">AI Score</span>
    </div>
    <div>
      <div class="item"><div class="label-row"><span>Speed</span><b>95</b></div><div class="bar"><div class="fill" style="width:95%"></div></div></div>
      <div class="item"><div class="label-row"><span>Agility</span><b>94</b></div><div class="bar"><div class="fill" style="width:94%"></div></div></div>
      <div class="item"><div class="label-row"><span>Strength</span><b>89</b></div><div class="bar"><div class="fill" style="width:89%"></div></div></div>
      <div class="item"><div class="label-row"><span>Flexibility</span><b>86</b></div><div class="bar"><div class="fill" style="width:86%"></div></div></div>
    </div>
    <div class="verify">
      <span class="v ai"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18V5L21 3v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>AI Verified</span>
      <span class="v"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M8 12l3 3 5-5"/></svg>AR Verified</span>
      <span class="v"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M8 12l3 3 5-5"/></svg>NCAA Cleared</span>
    </div>
  </div>
</body>
</html>
