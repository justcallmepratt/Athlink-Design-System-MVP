<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Athlink — Neutral scale</title>
  <link rel="stylesheet" href="../colors_and_type.css" />
  <style>
    body { margin: 0; padding: 20px; background: #fff; }
    .row { display: grid; grid-template-columns: repeat(10, 1fr); gap: 6px; }
    .swatch { border-radius: 8px; padding: 10px; min-height: 80px; display: flex; flex-direction: column; justify-content: space-between; }
    .swatch .step { font-family: var(--font-mono); font-size: 10px; font-weight: 600; }
    .swatch .hex  { font-family: var(--font-mono); font-size: 9.5px; opacity: 0.75; }
  </style>
</head>
<body>
  <div class="row">
    <div class="swatch" style="background:#F9FAFB;border:1px solid var(--border-default);color:#111827"><span class="step">50</span><span class="hex">#F9FAFB</span></div>
    <div class="swatch" style="background:#F3F4F6;color:#111827"><span class="step">100</span><span class="hex">#F3F4F6</span></div>
    <div class="swatch" style="background:#E5E7EB;color:#111827"><span class="step">200</span><span class="hex">#E5E7EB</span></div>
    <div class="swatch" style="background:#D1D5DB;color:#111827"><span class="step">300</span><span class="hex">#D1D5DB</span></div>
    <div class="swatch" style="background:#9CA3AF;color:#fff"><span class="step">400</span><span class="hex">#9CA3AF</span></div>
    <div class="swatch" style="background:#6B7280;color:#fff"><span class="step">500</span><span class="hex">#6B7280</span></div>
    <div class="swatch" style="background:#4B5563;color:#fff"><span class="step">600</span><span class="hex">#4B5563</span></div>
    <div class="swatch" style="background:#374151;color:#fff"><span class="step">700</span><span class="hex">#374151</span></div>
    <div class="swatch" style="background:#1F2937;color:#fff"><span class="step">800</span><span class="hex">#1F2937</span></div>
    <div class="swatch" style="background:#111827;color:#fff"><span class="step">900</span><span class="hex">#111827</span></div>
  </div>
</body>
</html>
