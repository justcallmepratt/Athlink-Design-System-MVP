<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Athlink — Brand colors</title>
  <link rel="stylesheet" href="../colors_and_type.css" />
  <style>
    body { margin: 0; padding: 20px; background: #fff; }
    .row { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr 1fr 1fr; gap: 12px; }
    .swatch { border-radius: 12px; padding: 16px; min-height: 96px; display: flex; flex-direction: column; justify-content: space-between; color: #fff; }
    .swatch.gradient { background: var(--grad-athlink); }
    .swatch .name { font-weight: 700; font-size: 13px; letter-spacing: -0.01em; }
    .swatch .hex  { font-family: var(--font-mono); font-size: 11px; opacity: 0.85; }
    .swatch .role { font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; opacity: 0.85; font-weight: 600; }
  </style>
</head>
<body>
  <div class="row">
    <div class="swatch gradient">
      <div class="role">Signature gradient</div>
      <div>
        <div class="name">Athlink Brand</div>
        <div class="hex">#2196F3 → #00BCD4 → #4CAF50</div>
      </div>
    </div>
    <div class="swatch" style="background:#2196F3"><div class="role">Primary</div><div><div class="name">Brand Blue</div><div class="hex">#2196F3</div></div></div>
    <div class="swatch" style="background:#1976D2"><div class="role">Press</div><div><div class="name">Blue 700</div><div class="hex">#1976D2</div></div></div>
    <div class="swatch" style="background:#00BCD4"><div class="role">Accent</div><div><div class="name">Cyan</div><div class="hex">#00BCD4</div></div></div>
    <div class="swatch" style="background:#4CAF50"><div class="role">Verified</div><div><div class="name">Green</div><div class="hex">#4CAF50</div></div></div>
    <div class="swatch" style="background:#E3F2FD;color:#1976D2"><div class="role" style="color:#1976D2">Tint</div><div><div class="name">Blue 50</div><div class="hex">#E3F2FD</div></div></div>
  </div>
</body>
</html>
